name: Charm CI

on:
  push:
    branches: [main]
    paths:
      - "charm/**"
      - "workload/src/**"
      - "demo/principal/**"
      - ".github/workflows/charm.yaml"
  pull_request:
    paths:
      - "charm/**"
      - "workload/src/**"
      - "demo/principal/**"
      - ".github/workflows/charm.yaml"

permissions: {}

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: uv run --group lint ruff format --check --diff src tests
      - run: uv run --group lint ruff check src tests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: uv run --group lint codespell .
      - run: uv run --group lint ty check src/charm.py src/mcp_server.py

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: |
          uv run --group unit coverage run --source=src -m pytest -v -s --tb native tests/unit
          uv run --group unit coverage report
        env:
          PYTHONPATH: lib:src

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [format-check, lint, unit-test]
    defaults:
      run:
        working-directory: charm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - name: Set up Juju
        uses: charmed-kubernetes/actions-operator@ea90ed489690bf3b1c1fcca6ac5f9edab70aecb0 # main
        with:
          provider: lxd
      - name: Sync workload files
        run: make -C .. sync-workload
      - name: Pack charm
        run: charmcraft pack
      - name: Pack demo principal
        run: charmcraft pack
        working-directory: ${{ github.workspace }}/demo/principal
      - name: Run integration tests
        run: uv run --group integration pytest -v -s --tb native --log-cli-level=INFO tests/integration
        env:
          PYTHONPATH: lib:src

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(charm|workload|charmlib)/
        exclude: ^charm/lib/
      - id: ruff-format
        files: ^(charm|workload|charmlib)/
        exclude: ^charm/lib/

# CLAUDE: there's a lot of config here, can some of it go into pyproject.toml so it also applies if manually running the tool?
  - repo: local
    hooks:
      - id: ty-charm
        name: ty (charm)
        entry: uv run --directory charm --group lint ty check src/charm.py src/mcp_server.py
        language: system
        files: ^charm/src/(charm|mcp_server)\.py$
        types: [python]
        pass_filenames: false
      - id: ty-workload
        name: ty (workload)
        entry: uv run --directory workload ty check src/server.py
        language: system
        files: ^workload/src/server\.py$
        types: [python]
        pass_filenames: false
      - id: ty-charmlib
        name: ty (charmlib)
        entry: uv run --directory charmlib ty check src/
        language: system
        files: ^charmlib/src/
        types: [python]
        pass_filenames: false
      - id: test-charm
        name: unit tests (charm)
        entry: bash -c 'cp workload/src/server.py charm/src/workload_server.py && cp workload/src/token_verifier.py charm/src/token_verifier.py && cd charm && PYTHONPATH=src:lib uv run --group unit pytest tests/unit -q'
        language: system
        files: ^(charm|workload)/
        types: [python]
        pass_filenames: false
      - id: test-workload
        name: unit tests (workload)
        entry: uv run --directory workload pytest tests/ -q
        language: system
        files: ^workload/
        types: [python]
        pass_filenames: false
      - id: test-charmlib
        name: unit tests (charmlib)
        entry: uv run --directory charmlib pytest tests/ -q
        language: system
        files: ^charmlib/
        types: [python]
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: ^charm/lib/
        additional_dependencies:
          - tomli

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(charm|workload)/
      - id: ruff-format
        files: ^(charm|workload)/

  - repo: local
    hooks:
      - id: ty-charm
        name: ty (charm)
        entry: uv run --directory charm ty check src/charm.py src/mcp_server.py
        language: system
        files: ^charm/src/(charm|mcp_server)\.py$
        types: [python]
        pass_filenames: false
      - id: ty-workload
        name: ty (workload)
        entry: uv run --directory workload ty check src/server.py
        language: system
        files: ^workload/src/server\.py$
        types: [python]
        pass_filenames: false
      - id: test-charm
        name: unit tests (charm)
        entry: bash -c 'cd charm && PYTHONPATH=src:lib uv run --group unit pytest tests/unit -q'
        language: system
        files: ^charm/
        types: [python]
        pass_filenames: false
      - id: test-workload
        name: unit tests (workload)
        entry: uv run --directory workload pytest tests/ -q
        language: system
        files: ^workload/
        types: [python]
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

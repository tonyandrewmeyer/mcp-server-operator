# uv version resolved from root uv.toml

name: Workload CI

on:
  push:
    branches: [main]
    paths:
      - "workload/**"
      - ".github/workflows/workload.yaml"
  pull_request:
    paths:
      - "workload/**"
      - ".github/workflows/workload.yaml"

permissions:
  contents: read

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run ruff format --check --diff src
      - run: uv run ruff check src

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run ty check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: |
          uv run coverage run --source=src -m pytest -v -s --tb native tests/
          uv run coverage report

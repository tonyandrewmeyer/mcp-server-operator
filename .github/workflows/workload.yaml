name: Workload CI

on:
  push:
    branches: [main]
    paths:
      - "workload/**"
      - ".github/workflows/workload.yaml"
  pull_request:
    paths:
      - "workload/**"
      - ".github/workflows/workload.yaml"

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: uv run ruff format --check --diff src
      - run: uv run ruff check src

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: uv run ty check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: |
          uv run coverage run --source=src -m pytest -v -s --tb native tests/
          uv run coverage report
